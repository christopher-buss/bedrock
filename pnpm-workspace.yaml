packages:
  - src/*

catalogMode: strict

catalogs:
  cli:
    "@antfu/ni": 28.0.0
    "@isentinel/eslint-config": 4.4.1
    bumpp: 10.3.2
    eslint: 9.39.1
    eslint-plugin-pnpm: 1.4.1
    jiti: 2.6.1
    lint-staged: 16.2.7
    simple-git-hooks: 2.13.1
    tsdown: 0.17.0
    tsx: 4.21.0
    typescript: 5.9.3
  testing:
    "@vitest/eslint-plugin": 1.5.1
    eslint-plugin-n: 17.23.1
    publint: 0.3.15
    unplugin-unused: 0.5.6
    vitest: 4.0.15
  types:
    "@isentinel/tsconfig": 1.0.0
    "@types/bun": 1.2.10

configDependencies:
  "@pnpm/trusted-deps": 0.1.1+sha512-jI3PWNv2zCg9+KHI3qQTsa534c5nisZQrHFeWSyyHoUXcuzvjkXxQKPFLJ/qtNAF+PtKHDlRntO2aZKb3VDuHQ==

enablePrePostScripts: true

ignoreWorkspaceRootCheck: true

onlyBuiltDependencies:
  - unrs-resolver

onlyBuiltDependenciesFile: node_modules/.pnpm-config/@pnpm/trusted-deps/allow.json

shellEmulator: true
