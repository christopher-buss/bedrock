catalogMode: prefer
cleanupUnusedCatalogs: true
enablePrePostScripts: true
ignoreWorkspaceRootCheck: true

publicHoistPattern:
  - "@typescript/*"

shellEmulator: true
trustPolicy: no-downgrade

packages:
  - "packages/*"
  - "apps/*"

catalogs:
  build:
    tsdown: 0.17.3
    unplugin-unused: 0.5.6
    vitepress: 1.5.0
  cli:
    pncat: 0.7.7
  dev:
    "@antfu/ni": 28.0.0
  lint:
    "@isentinel/eslint-config": 4.7.0
    "@vitest/eslint-plugin": 1.5.2
    eslint: 9.39.1
    eslint-plugin-n: 17.23.1
    eslint-plugin-pnpm: 1.4.2
    lint-staged: 16.2.7
    publint: 0.3.16
    simple-git-hooks: 2.13.1
  monorepo:
    turbo: 2.6.3
  script:
    jiti: 2.6.1
    tsx: 4.21.0
  test:
    "@vitest/coverage-v8": 4.0.15
    monocart-coverage-reports: 2.12.9
    vitest: 4.0.15
  tsc:
    "@isentinel/tsconfig": 1.1.0
    better-typescript-lib: 2.12.0
    typescript: 5.9.3
  types:
    "@types/bun": 1.3.4
    "@typescript/native-preview": latest

configDependencies:
  "@pnpm/trusted-deps": 0.1.1+sha512-jI3PWNv2zCg9+KHI3qQTsa534c5nisZQrHFeWSyyHoUXcuzvjkXxQKPFLJ/qtNAF+PtKHDlRntO2aZKb3VDuHQ==

onlyBuiltDependencies:
  - unrs-resolver
onlyBuiltDependenciesFile: node_modules/.pnpm-config/@pnpm/trusted-deps/allow.json
