catalogMode: prefer

cleanupUnusedCatalogs: true

enablePrePostScripts: true
ignoreWorkspaceRootCheck: true

publicHoistPattern:
  - "@typescript/*"

shellEmulator: true
trustPolicy: no-downgrade

trustPolicyExclude:
  - eslint-config-prettier@9.1.2
  - semver@6.3.1
  - chokidar@4.0.3
packages:
  - packages/*
  - apps/*
  - scripts/*
overrides:
  "@typescript-eslint/eslint-plugin": 8.58.1
  "@typescript-eslint/parser": 8.58.1
  "@typescript-eslint/type-utils": 8.58.1
  "@typescript-eslint/utils": 8.58.1
  vite: npm:@voidzero-dev/vite-plus-core@0.1.18
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.18

patchedDependencies:
  "@typescript/typescript6@6.0.0": patches/@typescript__typescript6@6.0.0.patch
  generate-jsdoc-example-tests: patches/generate-jsdoc-example-tests.patch

catalogs:
  build:
    typedoc: 0.28.19
    typedoc-plugin-markdown: 4.11.0
    typedoc-plugin-replace-text: 4.2.0
    unplugin-unused: 0.5.7
    vite-plus: 0.1.18
  dev:
    concurrently: 9.1.0
    eslint_d: 15.0.2
    file-entry-cache: 11.1.2
    get-tsconfig: 4.14.0
    madge: 8.0.0
    oxc-minify: 0.125.0
    pncat: 0.11.1
  docs:
    vitepress: 2.0.0-alpha.17
    vitepress-plugin-tabs: 0.8.0
  lint:
    "@commitlint/cli": 20.5.0
    "@commitlint/config-conventional": 20.5.0
    "@commitlint/config-pnpm-scopes": 20.4.3
    "@commitlint/prompt-cli": 20.5.0
    "@commitlint/types": 20.5.0
    "@eslint/config-inspector": 1.5.0
    "@isentinel/eslint-config": 5.0.0-beta.11
    "@isentinel/hooks": 1.3.0
    "@vitest/eslint-plugin": 1.6.16
    eslint: 9.39.2
    eslint-plugin-erasable-syntax-only: 0.4.0
    eslint-plugin-jest-extended: 3.0.1
    eslint-plugin-n: 17.24.0
    eslint-plugin-pnpm: 1.6.0
    knip: 6.4.1
    publint: 0.3.18
  script:
    jiti: 2.6.1
    std-env: 4.1.0
    tsx: 4.21.0
  test:
    "@stryker-mutator/api": 9.6.1
    "@stryker-mutator/core": 9.6.1
    "@stryker-mutator/typescript-checker": 9.6.1
    "@stryker-mutator/vitest-runner": 9.6.1
    "@vitest/coverage-v8": 4.1.4
    ajv: 8.18.0
    ajv-formats: 3.0.1
    generate-jsdoc-example-tests: 0.2.6
    jest-extended: 7.0.0
    monocart-coverage-reports: 2.12.10
    vitest: 4.1.4
  tsc:
    "@isentinel/tsconfig": 1.2.0
    better-typescript-lib: 2.12.0
    typescript: npm:@typescript/typescript6@6.0.0
  types:
    "@types/bun": 1.3.4
    "@typescript/native-preview": 7.0.0-dev.20260421.2
    type-fest: 5.6.0
configDependencies:
  "@pnpm/trusted-deps": 0.1.1+sha512-jI3PWNv2zCg9+KHI3qQTsa534c5nisZQrHFeWSyyHoUXcuzvjkXxQKPFLJ/qtNAF+PtKHDlRntO2aZKb3VDuHQ==
onlyBuiltDependencies:
  - unrs-resolver

onlyBuiltDependenciesFile: node_modules/.pnpm-config/@pnpm/trusted-deps/allow.json

trustPolicyIgnoreAfter: 10080 # 7 days
