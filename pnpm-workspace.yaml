catalogMode: prefer
cleanupUnusedCatalogs: true
enablePrePostScripts: true
ignoreWorkspaceRootCheck: true

publicHoistPattern:
  - "@typescript/*"

shellEmulator: true
trustPolicy: no-downgrade

trustPolicyExclude:
  - eslint-config-prettier@9.1.2
  - semver@6.3.1
  - chokidar@4.0.3

packages:
  - packages/*
  - apps/*
  - scripts/*

overrides:
  "@typescript-eslint/eslint-plugin": 8.58.1
  "@typescript-eslint/parser": 8.58.1
  "@typescript-eslint/type-utils": 8.58.1
  "@typescript-eslint/utils": 8.58.1

catalogs:
  build:
    tsdown: 0.21.8
    typedoc: 0.28.19
    typedoc-plugin-replace-text: 4.2.0
    unplugin-unused: 0.5.7
    vitepress: 2.0.0-alpha.17
  dev:
    pncat: 0.11.1
  lint:
    "@commitlint/cli": 20.5.0
    "@commitlint/config-conventional": 20.5.0
    "@commitlint/config-pnpm-scopes": 20.4.3
    "@commitlint/prompt-cli": 20.5.0
    "@commitlint/types": 20.5.0
    "@eslint/config-inspector": 1.5.0
    "@isentinel/eslint-config": 5.0.0-beta.9
    "@vitest/eslint-plugin": 1.6.15
    eslint: 9.39.2
    eslint-plugin-n: 17.24.0
    eslint-plugin-pnpm: 1.6.0
    publint: 0.3.18
  monorepo:
    turbo: 2.9.6
  script:
    jiti: 2.6.1
    std-env: 4.0.0
    tsx: 4.21.0
  test:
    "@vitest/coverage-v8": 4.1.4
    generate-jsdoc-example-tests: 0.2.6
    monocart-coverage-reports: 2.12.9
    vitest: 4.1.4
  tsc:
    "@isentinel/tsconfig": 1.2.0
    better-typescript-lib: 2.12.0
    typescript: 6.0.2
  types:
    "@types/bun": 1.3.4
    "@typescript/native-preview": latest
configDependencies:
  "@pnpm/trusted-deps": 0.1.1+sha512-jI3PWNv2zCg9+KHI3qQTsa534c5nisZQrHFeWSyyHoUXcuzvjkXxQKPFLJ/qtNAF+PtKHDlRntO2aZKb3VDuHQ==

onlyBuiltDependencies:
  - unrs-resolver

onlyBuiltDependenciesFile: node_modules/.pnpm-config/@pnpm/trusted-deps/allow.json
