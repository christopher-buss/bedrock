# Release pipeline for the published packages (@bedrock-rbx/core,
# @bedrock-rbx/ocale). Driven by Changesets (see ADR-027).
#
# Two modes, selected per push to main by whether unconsumed changeset
# files are present:
#
#   Version mode (changesets pending): apply `changeset version`, commit the
#   bump to the `changeset-release/main` branch as a GitHub-SIGNED commit via
#   the GraphQL API (the repo's `all` ruleset enforces required_signatures on
#   every branch, so an unsigned `git push` from the stock changesets/action
#   would be rejected), then open/refresh the "Version Packages" PR and
#   dispatch CI against the bot branch (PRs authored by GITHUB_TOKEN do not
#   auto-trigger workflows). Mirrors openapi-drift.yaml.
#
#   Publish mode (no changesets — i.e. a Version PR just merged): build and
#   `changeset publish` to npm with provenance, push the version tags, and
#   dispatch website-release.yaml for the new core tag (a GITHUB_TOKEN tag
#   push does not fire the `on: push: tags` trigger on its own).
#
# Auth is via OIDC trusted publishing (no npm token) — `id-token: write` lets
# pnpm exchange a short-lived token at publish time.
#
# External prerequisites (cannot be provisioned here):
#   - a Trusted Publisher configured on npmjs.com for each package, pointing at
#     this repo + release.yaml.
#   - repo setting "Allow GitHub Actions to create and approve pull requests".

name: Release

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  actions: write
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_BRANCH: changeset-release/main
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        uses: ./.github/actions/setup

      # A changeset is any *.md under .changeset/ other than README.md.
      - id: changesets
        name: Detect pending changesets
        run: |
          set -euo pipefail
          pending=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | head -n1)
          if [ -n "$pending" ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      # ---- Version mode -------------------------------------------------
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.changesets.outputs.pending == 'true'
        name: Apply version bump
        run: |
          pnpm changeset version
          pnpm install --lockfile-only

      # Move the bot branch ref onto main's (already-signed) tip. No new
      # commit is introduced, so required_signatures has nothing to verify;
      # the bump lands in the next step as a GitHub-signed API commit.
      - if: steps.changesets.outputs.pending == 'true'
        name: Reset release branch to base
        run: git push --force origin "HEAD:refs/heads/$RELEASE_BRANCH"

      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.changesets.outputs.pending == 'true'
        name: Commit version bump via API (signed)
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # v0.2.22
        with:
          branch: ${{ env.RELEASE_BRANCH }}
          commit_message: "ci: version packages"
          file_pattern: .changeset packages pnpm-lock.yaml
          repo: ${{ github.repository }}

      - if: steps.changesets.outputs.pending == 'true'
        name: Open or refresh the Version PR
        run: |
          set -euo pipefail
          if gh pr view "$RELEASE_BRANCH" --json number >/dev/null 2>&1; then
            echo "Version PR already open; refreshed with the latest bump."
          else
            gh pr create \
              --head "$RELEASE_BRANCH" \
              --base main \
              --title "ci: version packages" \
              --body "$(cat <<'EOF'
          Automated version bump from accumulated changesets (ADR-027).

          Merging this PR applies the version + CHANGELOG changes to `main`;
          the next `Release` run on that merge publishes the packages to npm
          and pushes their git tags.

          Review the bumped versions and generated `CHANGELOG.md` entries.
          To hold a release, leave this PR open — it refreshes automatically
          as more changesets land on `main`.

          🤖 Generated by the `release` workflow.
          EOF
          )"
          fi

      # PRs opened/updated with GITHUB_TOKEN do not auto-trigger workflows,
      # so dispatch CI explicitly against the bot branch (per openapi-drift).
      - if: steps.changesets.outputs.pending == 'true'
        name: Trigger CI on the release branch
        run: gh workflow run ci.yaml --ref "$RELEASE_BRANCH"

      # ---- Publish mode -------------------------------------------------
      - if: steps.changesets.outputs.pending == 'false'
        name: Build
        run: pnpm build

      # No npm token: auth is via OIDC trusted publishing. Each package has a
      # trusted publisher configured on npmjs.com pointing at this repo +
      # workflow; `id-token: write` lets pnpm exchange an OIDC token at publish
      # time, and provenance is attached automatically.
      - env:
          NPM_CONFIG_PROVENANCE: "true"
        id: publish
        if: steps.changesets.outputs.pending == 'false'
        name: Publish to npm
        run: |
          set -euo pipefail
          out=$(pnpm exec changeset publish 2>&1)
          echo "$out"
          if echo "$out" | grep -q "New tag:"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.changesets.outputs.pending == 'false' && steps.publish.outputs.published == 'true'
        name: Push tags
        run: git push origin --tags

      # The tag push above uses GITHUB_TOKEN and so will not fire
      # website-release.yaml's `on: push: tags` trigger. Dispatch it
      # explicitly against the new core tag for a tagged-source docs build.
      - if: steps.changesets.outputs.pending == 'false' && steps.publish.outputs.published == 'true'
        name: Trigger docs release for the core tag
        run: |
          set -euo pipefail
          # The `bedrock` package directory is the `@bedrock-rbx/core` package.
          version=$(node -p "require('./packages/bedrock/package.json').version")
          tag="@bedrock-rbx/core@${version}"
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q "$tag"; then
            gh workflow run website-release.yaml --ref "$tag"
          fi
    timeout-minutes: 15
