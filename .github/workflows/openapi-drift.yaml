name: OpenAPI Drift

on:
  schedule:
    # Weekly on Mondays at 06:00 UTC. Roblox does not ship spec
    # changes daily; a weekly cadence keeps the PR signal useful
    # without becoming noise.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh vendored openapi spec
    runs-on: ubuntu-latest
    env:
      DRIFT_BRANCH: automation/refresh-openapi-spec
      DRIFT_TITLE: "build(ocale): refresh vendored openapi spec"
      GH_TOKEN: ${{ github.token }}
    steps:
      # Pin to `main` so a `workflow_dispatch` from a feature branch
      # cannot accidentally use that branch's tip as the drift base.
      # The drift PR always targets `main`, so the base must be `main`.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Fetch upstream spec
        run: pnpm --filter @bedrock-rbx/ocale refresh-openapi

      - id: diff
        name: Detect drift
        run: |
          if git diff --quiet HEAD -- packages/open-cloud/vendor/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Reset the drift branch to the current commit before the API
      # commit lands. No new commits are introduced by this push, so
      # the "signed commits" ruleset has nothing to verify; the spec
      # diff lands in the next step as a GitHub-signed commit via the
      # GraphQL API.
      - if: steps.diff.outputs.changed == 'true'
        name: Reset drift branch ref to base
        run: git push --force origin "HEAD:refs/heads/$DRIFT_BRANCH"

      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.diff.outputs.changed == 'true'
        name: Commit refreshed spec via API
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
        with:
          branch: ${{ env.DRIFT_BRANCH }}
          commit_message: ${{ env.DRIFT_TITLE }}
          file_pattern: packages/open-cloud/vendor
          repo: ${{ github.repository }}

      - if: steps.diff.outputs.changed == 'true'
        name: Open drift PR if missing
        run: |
          set -euo pipefail
          if gh pr view "$DRIFT_BRANCH" --json number >/dev/null 2>&1; then
            echo "existing drift PR refreshed with latest spec"
          else
            gh pr create \
              --head "$DRIFT_BRANCH" \
              --base main \
              --title "$DRIFT_TITLE" \
              --body "$(cat <<EOF
          Automated refresh of the vendored Roblox OpenAPI spec.

          Auto-merge is enabled: once \`ci.yaml\` on this PR turns
          green, it will squash-merge into \`main\` without human
          intervention. Disable auto-merge on the PR if you want to
          review the diff manually before merging.

          ## What changed

          The upstream \`content/en-us/reference/cloud/openapi.json\` in
          [Roblox/creator-docs](https://github.com/Roblox/creator-docs) has
          diverged from our pinned copy. The diff in this PR is exactly
          what \`pnpm --filter @bedrock-rbx/ocale refresh-openapi\` produced
          against main.

          ## What to review

          - Scan the spec diff for breaking shape changes to any schema
            your integration tests exercise.
          - If CI on this PR fails, that is a real signal: a fixture or
            parser needs to catch up. Fix it in this same PR rather
            than merging known-broken spec.
          - Check the updated \`vendor/README.md\` pinned-commit SHA
            matches the latest upstream commit touching the spec file.

          ## When in doubt

          Close the PR to defer; the next scheduled run will reopen it.

          🤖 Generated by the \`openapi-drift\` workflow.
          EOF
          )"
          fi

      # PRs opened with GITHUB_TOKEN do not auto-trigger other
      # workflows, so dispatch ci.yaml explicitly against the drift
      # branch. The resulting check runs attach to the branch head
      # and show up on the PR, letting auto-merge wait on them.
      - if: steps.diff.outputs.changed == 'true'
        name: Trigger CI on the drift branch
        run: gh workflow run ci.yaml --ref "$DRIFT_BRANCH"

      # Non-fatal: if the repo does not have auto-merge enabled or
      # branch protection requires a check ci.yaml does not produce,
      # the PR still stands open for a human merge.
      - continue-on-error: true
        if: steps.diff.outputs.changed == 'true'
        name: Enable auto-merge on the drift PR
        run: gh pr merge "$DRIFT_BRANCH" --auto --squash
    timeout-minutes: 15
