name: OpenAPI Drift

on:
  schedule:
    # Weekly on Mondays at 06:00 UTC. Roblox does not ship spec
    # changes daily; a weekly cadence keeps the PR signal useful
    # without becoming noise.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh vendored openapi spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Fetch upstream spec
        run: cd packages/open-cloud && bun scripts/fetch-openapi.ts

      - id: diff
        name: Detect drift
        run: |
          if git diff --quiet HEAD -- packages/open-cloud/vendor/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Run the same checks as ci.yaml inline, because a PR opened with
      # GITHUB_TOKEN will not trigger other workflows. Running them here
      # gives us a direct pass/fail signal on drift. A failure does not
      # block the PR from being opened - that IS the signal reviewers
      # need to see.
      - continue-on-error: true
        id: checks
        if: steps.diff.outputs.changed == 'true'
        name: Run checks against drifted spec
        run: hk check --all

      - env:
          CHECKS_OUTCOME: ${{ steps.checks.outcome }}
          GH_TOKEN: ${{ github.token }}
        if: steps.diff.outputs.changed == 'true'
        name: Open or update drift PR
        run: |
          set -euo pipefail
          branch="automation/refresh-openapi-spec"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add packages/open-cloud/vendor/
          git commit -m "build(ocale): refresh vendored openapi spec"
          git push --force origin "$branch"

          if [ "$CHECKS_OUTCOME" = "success" ]; then
            status="✅ \`hk check --all\` passed against the drifted spec."
          else
            status="❌ \`hk check --all\` failed against the drifted spec. See the workflow run for details; a fixture or parser needs to catch up."
          fi

          if gh pr view "$branch" --json number >/dev/null 2>&1; then
            gh pr comment "$branch" --body "Drift PR refreshed. ${status}"
          else
            gh pr create \
              --head "$branch" \
              --base main \
              --title "build(ocale): refresh vendored openapi spec" \
              --body "$(cat <<EOF
          Automated refresh of the vendored Roblox OpenAPI spec.

          ${status}

          ## What changed

          The upstream \`content/en-us/reference/cloud/openapi.json\` in
          [Roblox/creator-docs](https://github.com/Roblox/creator-docs) has
          diverged from our pinned copy. The diff in this PR is exactly
          what \`bun packages/open-cloud/scripts/fetch-openapi.ts\` produced
          against main.

          ## What to review

          - Scan the spec diff for breaking shape changes to any schema
            your integration tests exercise.
          - If the inline \`hk check --all\` run failed, that is a real
            signal: a fixture or parser needs to catch up. Fix it in this
            same PR rather than merging known-broken spec. GitHub does
            not auto-run \`ci.yaml\` on PRs opened with \`GITHUB_TOKEN\`,
            so push a commit (or close/reopen this PR) to trigger it
            once fixes are in.
          - Check the updated \`vendor/README.md\` pinned-commit SHA
            matches the latest upstream commit touching the spec file.

          ## When in doubt

          Close the PR to defer; the next scheduled run will reopen it.

          🤖 Generated by the \`openapi-drift\` workflow.
          EOF
          )"
          fi
    timeout-minutes: 15
