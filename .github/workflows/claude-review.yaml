name: Claude Code Review

on:
  pull_request:
    types: [opened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Only run if it's a PR from the same repo and not from a bot
    if: |
      github.event.pull_request != null &&
      github.event.sender.type != 'Bot' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      actions: read
      contents: read
      id-token: write
      issues: read
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        name: Wait for triage to complete
        run: |
          # Wait for triage workflow to complete (max 5 minutes)
          for i in {1..30}; do
            # Get the latest triage run for this PR commit
            TRIAGE_STATUS=$(gh run list --workflow=claude-triage.yaml \
              --repo "$REPO" \
              --json conclusion,status,headSha \
              --jq ".[] | select(.headSha == \"$PR_HEAD_SHA\") | .conclusion" \
              --limit 1)

            if [ "$TRIAGE_STATUS" = "success" ]; then
              echo "Triage completed successfully"
              exit 0
            elif [ "$TRIAGE_STATUS" = "failure" ] || [ "$TRIAGE_STATUS" = "cancelled" ]; then
              echo "Triage did not succeed (status: $TRIAGE_STATUS), skipping review"
              exit 1
            fi

            echo "Waiting for triage to complete... (attempt $i/30)"
            sleep 10
          done

          echo "Triage did not complete in time, skipping review"
          exit 1

      - env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        id: skip-check
        name: Check if should skip
        run: |
          # Check for skip-review label
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "^skip-review$"; then
            echo "skip-review label found - skipping review"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get list of changed files in this PR
          CHANGED_FILES=$(gh pr diff "$PR_NUMBER" --name-only --repo "$REPO")

          # Check if this workflow file is in the changed files
          WORKFLOW=".github/workflows/claude-review.yaml"
          if echo "$CHANGED_FILES" | grep -q "^$WORKFLOW$"; then
            echo "Workflow file changed - skipping review"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - if: steps.skip-check.outputs.skip != 'true'
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}

      - id: read-prompt
        if: steps.skip-check.outputs.skip != 'true'
        name: Read review prompt
        run: |
          {
            echo 'prompt<<EOF'
            cat .claude/prompts/review-prompt.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - id: claude-review
        if: steps.skip-check.outputs.skip != 'true'
        name: Run Claude Code Review
        uses: anthropics/claude-code-action@c3d45e8e941e1b2ad7b278c57482d9c5bf1f35b3 # v1.0.99
        with:
          claude_args: |
            --allowedTools "Glob,Grep,Read,mcp__github__add_pull_request_review_comment_to_pending_review,mcp__github__create_pending_pull_request_review,mcp__github__get_pull_request_diff,mcp__github__submit_pending_pull_request_review"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            # Bedrock Code Review

            Review this PR for compliance with Bedrock's architecture and
            standards.

            ${{ steps.read-prompt.outputs.prompt }}

            ---

            Use CLAUDE.md for project-specific guidance. Provide specific,
            actionable feedback with inline comments. Include an overall summary
            when submitting.

            **Important**: Submit as "COMMENT" type (don't block PR).

          track_progress: true
