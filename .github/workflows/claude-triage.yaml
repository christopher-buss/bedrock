name: Claude Triage

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  triage:
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - id: read-prompt
        name: Read triage prompt
        run: |
          {
            echo 'prompt<<EOF'
            cat .claude/prompts/triage-prompt.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - if: github.event_name == 'issues'
        name: Triage Issue
        uses: anthropics/claude-code-action@931e62027356f4c337273719db085805456e53cc # v1.0.98
        with:
          allowed_non_write_users: "*"
          claude_args: |
            --model haiku
            --allowedTools "Bash(gh label list:*),Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh search issues:*)"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}

            ${{ steps.read-prompt.outputs.prompt }}

      - if: github.event_name == 'pull_request'
        name: Triage Pull Request
        uses: anthropics/claude-code-action@931e62027356f4c337273719db085805456e53cc # v1.0.98
        with:
          allowed_non_write_users: "*"
          claude_args: |
            --model haiku
            --allowedTools "Bash(gh label list:*),Bash(gh pr view:*),Bash(gh pr edit:*),Bash(gh pr diff:*)"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            ${{ steps.read-prompt.outputs.prompt }}

            ---

            ## skip-review Label

            Add the "skip-review" label if this PR is trivial:
            - Config file changes only (mise.toml, .gitignore, etc.)
            - Dependency updates
            - Typo fixes
            - Comment-only changes
            - CI/workflow file changes

            Do NOT add skip-review for:
            - New features
            - Bug fixes in application code
            - Refactoring
            - Any changes to src/ or core logic

            Use `gh pr diff` to check what files changed before deciding.
    timeout-minutes: 5
