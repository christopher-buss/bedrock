name: CI

on:
  merge_group:

  pull_request:
    branches: [main]

  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache ESLint
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: eslint-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', 'eslint.config.*') }}
          path: .eslintcache
          restore-keys: eslint-${{ runner.os }}-

      - name: Run hk check
        run: hk check --all

      - if: always()
        name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - if: failure()
        name: Upload build artifacts on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-artifacts
          path: |
            packages/*/dist/
            apps/*/dist/
            **/*.log
          retention-days: 7
    timeout-minutes: 15

  mutation:
    name: Mutation Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - id: stryker-hash
        name: Hash Stryker config inputs
        run: echo "hash=${{ hashFiles('packages/testing/src/stryker.ts', 'packages/*/stryker.config.ts', 'packages/*/tsconfig.json', 'pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - id: stryker-cache
        name: Restore Stryker incremental cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: stryker-${{ runner.os }}-${{ steps.stryker-hash.outputs.hash }}-${{ github.head_ref }}-${{ github.sha }}
          path: |
            packages/*/reports/stryker-incremental.json
          restore-keys: |
            stryker-${{ runner.os }}-${{ steps.stryker-hash.outputs.hash }}-${{ github.head_ref }}-

      - env:
          MUTATE_BASE_REF: origin/${{ github.base_ref }}
          VITEST_TYPECHECK: "false"
        name: Mutation test changed files
        run: pnpm mutate:changed

      - if: always() && steps.stryker-cache.outputs.cache-hit != 'true'
        name: Save Stryker incremental cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ${{ steps.stryker-cache.outputs.cache-primary-key }}
          path: |
            packages/*/reports/stryker-incremental.json
    timeout-minutes: 20
