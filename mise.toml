[env]
_.file = { path = ".env", redact = true }
_.path = [
  '{{config_root}}/node_modules/.bin',
  '{{cwd}}/node_modules/.bin', 
]

[settings]
experimental = true
lockfile = true

[tools]
"github:luau-lang/lute" = "1.0.0"
"npm:@antfu/ni" = "latest"
"npm:eslint_d" = "latest"
"npm:pncat" = "latest"
"npm:vercel" = "latest"
bun = "1.3.14"
hk = { version = "1.45.0", postinstall = 'if [ -z "$CI" ]; then hk install --mise; fi' }
node = { version = "lts", postinstall = "corepack enable" }
pkl = "latest"

